# CI: install from source, import smoke test, and run the public test suite
# against a data fixture (ziegler + decay + iaea_monitors + IRDFF, ~165 MB)
# fetched from the curie-data v2 release into a pre-populated data directory.
# Tests needing endf/tendl skip with reported reasons. The cold-cache job installs the built wheel on a clean
# machine and lets curie fetch its own data (whole-file and endf shards) from
# the data release, end to end.
name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install curie and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest pytest-doctestplus

      - name: Restore nuclear data fixture
        id: data-cache
        uses: actions/cache@v4
        with:
          path: ~/curie-ci-data
          key: curie-data-v2-${{ hashFiles('curie/data_registry.json') }}

      - name: Fetch data fixture from the curie-data v2 release
        if: steps.data-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/curie-ci-data && cd ~/curie-ci-data
          base="https://github.com/jtmorrell/curie-data/releases/download/v2"
          for f in SHA256SUMS ziegler.db decay.db iaea_monitors.db IRDFF.db; do
            curl -sSL --retry 3 -O "$base/$f"
          done

      - name: Verify data checksums
        run: cd ~/curie-ci-data && sha256sum -c SHA256SUMS --ignore-missing

      - name: Import smoke test
        env:
          CURIE_DATA_DIR: /home/runner/curie-ci-data
        run: python -c "import curie; print('curie', curie.__version__)"

      - name: Run public test suite
        env:
          CURIE_DATA_DIR: /home/runner/curie-ci-data
        run: python -m pytest -ra

      - name: Run docstring doctests (data-light modules)
        # Runs the docstring examples as doctests to catch example rot. Scoped to
        # the modules whose examples are deterministic and need only the fixture
        # data (ziegler + decay); plot / file-I/O / DataFrame / endf-tendl
        # examples are excluded via each module's __doctest_skip__. The
        # `import curie as ci` alias is injected by conftest.py.
        env:
          CURIE_DATA_DIR: /home/runner/curie-ci-data
          MPLBACKEND: Agg
        run: |
          python -m pytest --doctest-plus --doctest-modules \
            curie/element.py curie/compound.py curie/isotope.py curie/calibration.py

  cold-cache:
    # a fresh machine: wheel install, empty cache, no local data anywhere;
    # curie must fetch what it needs (iaea whole-file, endf per-target shards)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build and install the wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel
          python -m pip install dist/*.whl

      - name: End-to-end cold-cache fetch
        working-directory: ${{ runner.temp }}
        run: |
          python -c "
          import curie as ci
          from curie.data import _data_path
          # endf: fetches the all_reactions index shard + one target shard (~2 MB)
          lb = ci.Library('endf')
          assert lb.search(target='115IN', outgoing='g'), 'endf search failed'
          xs = lb.retrieve(target='115IN', outgoing='g')
          assert len(xs) > 10, 'endf retrieve failed'
          # iaea: whole-file fetch (4 MB)
          lb = ci.Library('iaea')
          assert lb.search(target='natCU', incident='p', product='62ZN'), 'iaea search failed'
          import os
          print('cache contents:', sorted(os.listdir(_data_path())))
          "
